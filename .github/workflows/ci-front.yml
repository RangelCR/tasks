name: APP TASKS
on:
  push:
    branches:
      - main
    paths:
      - 'front/**'
jobs: 
  ci-front:
    name: CI-FRONT
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o código
        uses: actions/checkout@v5.0.0
      - name: Autenticando no docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}      
      - name: Construção e push da imagem front
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            rangelcr/front-task:v${{ github.run_number }}
            rangelcr/front-task:latest

  commit-front:
    name: COMMIT-FRONT
    needs: CI-FRONT
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o código
        uses: actions/checkout@v5.0.0
      - name: Update image tag in manifest
        run: |
          sed -i "s|rangelcr/front-task:.*|rangelcr/front-task:v${{ github.run_number }}|" k8s/front_deployment.yaml
          git config user.email "hrangel584@gmail.com"
          git config user.name "rangelcr"
          git add k8s/
          git commit -m "Atualizando imagem v${{ github.run_number }} [skip ci]"
          git push   