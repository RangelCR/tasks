name: Deploy APP TASKS
on:
  workflow_dispatch:
jobs: 
  CI:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o código
        uses: actions/checkout@v5.0.0
      - name: Autenticando no docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Construção e push da imagem DB
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./DB
          file: ./DB/Dockerfile
          push: true
          tags: |
            rangelcr/db-task:v${{ github.run_number }}
            rangelcr/db-task:latest          
      - name: Construção e push da imagem front
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            rangelcr/front-task:v${{ github.run_number }}
            rangelcr/front-task:latest
      - name: Construção e push da imagem da API
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            rangelcr/api-task:v${{ github.run_number }}
            rangelcr/api-task:latest            
