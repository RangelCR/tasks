name: Deploy APP TASKS
on:
  workflow_dispatch:

jobs:
  CI:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o código
        uses: actions/checkout@v4

      - name: Calculando hash do contexto
        id: hash
        run: |
          HASH=$(find ./frontend -type f | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          echo "image_hash=$HASH" >> $GITHUB_OUTPUT

      - name: Autenticando no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verificando se imagem já existe no registry
        id: check
        run: |
          EXISTS=$(docker manifest inspect rangelcr/front_task:${{ steps.hash.outputs.image_hash }} > /dev/null 2>&1 && echo "true" || echo "false")
          echo "image_exists=$EXISTS" >> $GITHUB_OUTPUT

      - name: Construção e push da imagem front
        if: steps.check.outputs.image_exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            rangelcr/front_task:${{ steps.hash.outputs.image_hash }}
            rangelcr/front_task:v${{ github.run_number }}
            rangelcr/front_task:latest
